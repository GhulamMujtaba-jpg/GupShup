<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GupShup Pro | Ultimate Social Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== 10 PROFESSIONAL THEMES ==================== */
        body.theme-default { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body.theme-dark { background: #0a0a0a; }
        body.theme-ocean { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        body.theme-sunset { background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%); }
        body.theme-forest { background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); }
        body.theme-candy { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        body.theme-midnight { background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%); }
        body.theme-rose { background: linear-gradient(135deg, #f43b47 0%, #453a94 100%); }
        body.theme-mint { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        body.theme-lavender { background: linear-gradient(135deg, #b224ef 0%, #7579ff 100%); }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 92vh;
            background: #ffffff;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        /* Premium Header */
        .app-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .app-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: shimmer 8s infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(-20%, -20%); }
            50% { transform: translate(20%, 20%); }
        }

        .logo h2 {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #ffd89b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.6rem;
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.98);
            padding: 8px 16px;
            gap: 6px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            flex: 0 0 auto;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            color: #5a5a7a;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-tab i {
            margin-right: 8px;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            background: #f8faff;
            padding: 16px;
        }

        /* Auth Screen Premium */
        .auth-screen {
            min-height: 100%;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            padding: 40px 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .auth-card h3 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 60px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 16px;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        /* User Info Bar */
        .user-info-bar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
        }

        .avatar {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            backdrop-filter: blur(10px);
            object-fit: cover;
        }

        .avatar-img {
            width: 56px;
            height: 56px;
            border-radius: 32px;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
        }

        .user-details h4 {
            font-size: 1.1rem;
        }

        .user-details p {
            font-size: 0.7rem;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            gap: 18px;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* Cards */
        .user-card, .group-card, .channel-card, .community-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: white;
            margin: 10px 0;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .user-card:hover, .group-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
        }

        .user-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
        }

        .follow-btn, .message-btn, .block-btn, .unfollow-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .follow-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .unfollow-btn {
            background: #f0f0f0;
            color: #666;
        }

        .message-btn {
            background: #25d366;
            color: white;
        }

        .block-btn {
            background: #ff4d4d20;
            color: #ff4d4d;
            border: 1px solid #ff4d4d40;
        }

        /* Chat Area Premium */
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7ff;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 24px;
            word-wrap: break-word;
            font-weight: 500;
        }

        .sent .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .received .bubble {
            background: white;
            color: #1e1e2e;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .chat-input-area {
            background: white;
            padding: 14px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eef2ff;
        }

        .chat-input {
            flex: 1;
            background: #f0f3fe;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            width: 48px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #f0f0f0;
        }

        .send-msg-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            width: 52px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Status & Stories */
        .status-upload {
            background: white;
            padding: 24px;
            border-radius: 32px;
            text-align: center;
            border: 2px dashed #667eea;
            margin-bottom: 20px;
        }

        .status-upload textarea {
            width: 100%;
            background: #f5f7ff;
            border: none;
            border-radius: 24px;
            padding: 14px;
            resize: none;
            margin-top: 12px;
        }

        .status-card {
            background: white;
            margin: 12px 0;
            padding: 14px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .status-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-option {
            padding: 14px;
            margin: 6px;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }

        .theme-option:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f0f0;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="theme-default">
<div class="app-container" id="appRoot"></div>

<script>
    // ==================== PROFESSIONAL DATABASE WITH SECURITY ====================
    let currentUser = null;
    let users = [];
    let messages = [];
    let groups = [];
    let channels = [];
    let communities = [];
    let statuses = [];

    // Secure Hash Function
    function hashPassword(password) {
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
            hash = ((hash << 5) - hash) + password.charCodeAt(i);
            hash = hash & hash;
        }
        return (hash >>> 0).toString(16);
    }

    // Storage Functions
    function saveToLocalStorage() {
        localStorage.setItem('gupshup_pro_users', JSON.stringify(users));
        localStorage.setItem('gupshup_pro_messages', JSON.stringify(messages));
        localStorage.setItem('gupshup_pro_groups', JSON.stringify(groups));
        localStorage.setItem('gupshup_pro_channels', JSON.stringify(channels));
        localStorage.setItem('gupshup_pro_communities', JSON.stringify(communities));
        localStorage.setItem('gupshup_pro_statuses', JSON.stringify(statuses));
    }

    function loadFromLocalStorage() {
        const u = localStorage.getItem('gupshup_pro_users');
        const m = localStorage.getItem('gupshup_pro_messages');
        const g = localStorage.getItem('gupshup_pro_groups');
        const c = localStorage.getItem('gupshup_pro_channels');
        const com = localStorage.getItem('gupshup_pro_communities');
        const s = localStorage.getItem('gupshup_pro_statuses');
        
        if (u) users = JSON.parse(u);
        if (m) messages = JSON.parse(m);
        if (g) groups = JSON.parse(g);
        if (c) channels = JSON.parse(c);
        if (com) communities = JSON.parse(com);
        if (s) statuses = JSON.parse(s);
        
        if (users.length === 0) initDemoUsers();
    }

    function initDemoUsers() {
        users = [
            { id: "1", email: "zara@gupshup.com", passwordHash: hashPassword("123"), name: "Zara Ahmed", handle: "@zara", avatar: "Z", avatarData: null, bio: "Digital Creator ✨ | Content Strategist", followers: [], following: [], blocked: [], muted: [], settings: { notifMute: false }, createdAt: Date.now() },
            { id: "2", email: "ali@gupshup.com", passwordHash: hashPassword("123"), name: "Ali Raza", handle: "@ali", avatar: "A", avatarData: null, bio: "Tech Entrepreneur 💻 | Innovation Enthusiast", followers: [], following: [], blocked: [], muted: [], settings: { notifMute: false }, createdAt: Date.now() },
            { id: "3", email: "sana@gupshup.com", passwordHash: hashPassword("123"), name: "Sana Khan", handle: "@sana", avatar: "S", avatarData: null, bio: "Visual Artist 🎨 | Creative Director", followers: [], following: [], blocked: [], muted: [], settings: { notifMute: false }, createdAt: Date.now() },
            { id: "4", email: "hamza@gupshup.com", passwordHash: hashPassword("123"), name: "Hamza Chaudhry", handle: "@hamza", avatar: "H", avatarData: null, bio: "Fitness Coach 💪 | Wellness Advocate", followers: [], following: [], blocked: [], muted: [], settings: { notifMute: false }, createdAt: Date.now() }
        ];
        saveToLocalStorage();
    }

    // Authentication
    function registerUser(email, password, name) {
        if (users.find(u => u.email === email)) return null;
        let baseHandle = name.toLowerCase().replace(/\s/g, '') + Math.floor(Math.random() * 1000);
        let handle = `@${baseHandle}`;
        while (users.some(u => u.handle === handle)) {
            handle = `@${baseHandle}${Math.floor(Math.random() * 100)}`;
        }
        const newUser = {
            id: Date.now() + Math.random(),
            email: email,
            passwordHash: hashPassword(password),
            name: name,
            handle: handle,
            avatar: name.charAt(0).toUpperCase(),
            avatarData: null,
            bio: "New to GupShup Pro! 🚀",
            followers: [],
            following: [],
            blocked: [],
            muted: [],
            settings: { notifMute: false },
            createdAt: Date.now()
        };
        users.push(newUser);
        saveToLocalStorage();
        return newUser;
    }

    function loginUser(email, password) {
        return users.find(u => u.email === email && u.passwordHash === hashPassword(password));
    }

    // Follow System
    function followUser(handle, targetHandle) {
        const user = users.find(u => u.handle === handle);
        const target = users.find(u => u.handle === targetHandle);
        if (user && target && !user.following.includes(targetHandle) && handle !== targetHandle) {
            user.following.push(targetHandle);
            target.followers.push(handle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    function unfollowUser(handle, targetHandle) {
        const user = users.find(u => u.handle === handle);
        const target = users.find(u => u.handle === targetHandle);
        if (user) {
            user.following = user.following.filter(f => f !== targetHandle);
            if (target) target.followers = target.followers.filter(f => f !== handle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    function isFollowing(handle, targetHandle) {
        const user = users.find(u => u.handle === handle);
        return user?.following.includes(targetHandle) || false;
    }

    // Block/Unblock System
    function blockUser(blockerHandle, targetHandle) {
        const target = users.find(u => u.handle === targetHandle);
        if (target && !target.blocked.includes(blockerHandle)) {
            target.blocked.push(blockerHandle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    function unblockUser(blockerHandle, targetHandle) {
        const target = users.find(u => u.handle === targetHandle);
        if (target) {
            target.blocked = target.blocked.filter(b => b !== blockerHandle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    function isBlocked(handleA, handleB) {
        const userB = users.find(u => u.handle === handleB);
        return userB?.blocked.includes(handleA) || false;
    }

    // Mute System
    function muteUser(handle, targetHandle) {
        const target = users.find(u => u.handle === targetHandle);
        if (target && !target.muted.includes(handle)) {
            target.muted.push(handle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    function unmuteUser(handle, targetHandle) {
        const target = users.find(u => u.handle === targetHandle);
        if (target) {
            target.muted = target.muted.filter(m => m !== handle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    // Profile Management
    function changeHandle(user, newHandle) {
        if (!newHandle.startsWith('@')) return false;
        if (users.some(u => u.handle === newHandle)) return false;
        user.handle = newHandle;
        saveToLocalStorage();
        return true;
    }

    function updateProfilePicture(user, imageUrl) {
        user.avatarData = imageUrl;
        user.avatar = "📸";
        saveToLocalStorage();
        return true;
    }

    function updateBio(user, newBio) {
        user.bio = newBio;
        saveToLocalStorage();
        return true;
    }

    // Messaging System
    function sendMessage(from, to, text, type = "text") {
        const message = {
            id: Date.now() + Math.random(),
            from: from,
            to: to,
            text: text,
            type: type,
            timestamp: Date.now(),
            isOneTime: false
        };
        messages.push(message);
        saveToLocalStorage();
        return message;
    }

    function sendOneTimeMessage(from, to, text) {
        const message = {
            id: Date.now() + Math.random(),
            from: from,
            to: to,
            text: text,
            type: "one_time",
            timestamp: Date.now(),
            isOneTime: true,
            expiry: Date.now() + 60000
        };
        messages.push(message);
        saveToLocalStorage();
        return message;
    }

    function sendVoiceNote(from, to, duration = "3s") {
        return sendMessage(from, to, `🎤 Voice note (${duration})`, "voice");
    }

    function getChatMessages(handleA, handleB) {
        return messages.filter(m =>
            (m.from === handleA && m.to === handleB) ||
            (m.from === handleB && m.to === handleA)
        ).sort((a, b) => a.timestamp - b.timestamp);
    }

    // Groups System
    function createGroup(name, adminHandle, isPublic = true) {
        const group = {
            id: Date.now() + Math.random(),
            name: name,
            admin: adminHandle,
            members: [adminHandle],
            isPublic: isPublic,
            messages: [],
            createdAt: Date.now()
        };
        groups.push(group);
        saveToLocalStorage();
        return group;
    }

    function addMemberToGroup(groupId, memberHandle) {
        const group = groups.find(g => g.id == groupId);
        if (group && !group.members.includes(memberHandle)) {
            group.members.push(memberHandle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    // Channels System
    function createChannel(name, ownerHandle) {
        const channel = {
            id: Date.now() + Math.random(),
            name: name,
            owner: ownerHandle,
            subscribers: [ownerHandle],
            posts: [],
            createdAt: Date.now()
        };
        channels.push(channel);
        saveToLocalStorage();
        return channel;
    }

    function subscribeToChannel(channelId, userHandle) {
        const channel = channels.find(c => c.id == channelId);
        if (channel && !channel.subscribers.includes(userHandle)) {
            channel.subscribers.push(userHandle);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    // Communities System
    function createCommunity(name, adminHandle, groupIds = []) {
        const community = {
            id: Date.now() + Math.random(),
            name: name,
            admin: adminHandle,
            groupIds: groupIds,
            createdAt: Date.now()
        };
        communities.push(community);
        saveToLocalStorage();
        return community;
    }

    function addGroupToCommunity(communityId, groupId) {
        const community = communities.find(c => c.id == communityId);
        if (community && !community.groupIds.includes(groupId)) {
            community.groupIds.push(groupId);
            saveToLocalStorage();
            return true;
        }
        return false;
    }

    // Status System
    function addStatus(userHandle, content) {
        const status = {
            id: Date.now() + Math.random(),
            user: userHandle,
            content: content,
            type: "text",
            timestamp: Date.now()
        };
        statuses.push(status);
        saveToLocalStorage();
        return status;
    }

    function getVisibleStatuses(userHandle) {
        const user = users.find(u => u.handle === userHandle);
        if (!user) return [];
        const twoHoursAgo = Date.now() - (2 * 60 * 60 * 1000);
        return statuses.filter(s =>
            s.timestamp > twoHoursAgo &&
            user.following.includes(s.user)
        ).sort((a, b) => b.timestamp - a.timestamp);
    }

    // Helper Functions
    function getVisibleUsers(handle) {
        return users.filter(u =>
            u.handle !== handle &&
            !isBlocked(handle, u.handle) &&
            !isBlocked(u.handle, handle)
        );
    }

    function getFollowedUsers(handle) {
        const user = users.find(u => u.handle === handle);
        return user?.following.map(h => users.find(u => u.handle === h)).filter(u => u && !isBlocked(handle, u.handle)) || [];
    }

    function openChat(user) {
        const messagesList = getChatMessages(currentUser.handle, user.handle);
        
        root.innerHTML = `
            <div class="chat-header">
                <button class="back-btn" id="backChatBtn"><i class="fas fa-arrow-left"></i></button>
                <div class="avatar">${user.avatarData ? `<img src="${user.avatarData}" class="avatar-img">` : user.avatar}</div>
                <div style="flex:1">
                    <b>${user.name}</b>
                    <p style="font-size:12px;">${user.handle}</p>
                </div>
                <button id="videoCallBtn" class="back-btn"><i class="fas fa-video"></i></button>
                <button id="voiceCallBtn" class="back-btn"><i class="fas fa-phone"></i></button>
                <button id="muteChatBtn" class="back-btn"><i class="fas fa-bell-slash"></i></button>
            </div>
            <div class="messages-area" id="chatMessages"></div>
            <div class="chat-input-area">
                <button class="icon-btn" id="emojiBtn">😀</button>
                <button class="icon-btn" id="stickerBtn">🎨</button>
                <button class="icon-btn" id="voiceNoteBtn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="chatInput" class="chat-input" placeholder="Type a message...">
                <button id="sendMsgBtn" class="send-msg-btn"><i class="fas fa-paper-plane"></i></button>
                <button id="oneTimeMsgBtn" class="icon-btn"><i class="fas fa-hourglass-half"></i></button>
            </div>
        `;
        
        const msgContainer = document.getElementById('chatMessages');
        
        function renderMessages() {
            const updated = getChatMessages(currentUser.handle, user.handle);
            msgContainer.innerHTML = updated.map(m => `
                <div class="message ${m.from === currentUser.handle ? 'sent' : 'received'}">
                    <div class="bubble">
                        ${m.type === 'one_time' && m.from !== currentUser.handle ? '🔒 Tap to view' : m.text}
                        ${m.type === 'voice' ? ' 🎤' : ''}
                        <div style="font-size:9px; opacity:0.7;">${new Date(m.timestamp).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');
            msgContainer.scrollTop = msgContainer.scrollHeight;
            
            document.querySelectorAll('.message.received .bubble').forEach((bubble, idx) => {
                const msg = updated.filter(m => m.from !== currentUser.handle)[idx];
                if (msg && msg.isOneTime) {
                    bubble.style.cursor = 'pointer';
                    bubble.onclick = () => {
                        alert(`One-time message: ${msg.text}`);
                        messages = messages.filter(m => m.id !== msg.id);
                        saveToLocalStorage();
                        renderMessages();
                    };
                }
            });
        }
        
        renderMessages();
        
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendMsgBtn');
        
        const sendMessageFunc = () => {
            const text = input.value.trim();
            if (text) {
                sendMessage(currentUser.handle, user.handle, text);
                input.value = '';
                renderMessages();
            }
        };
        
        sendBtn.onclick = sendMessageFunc;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessageFunc(); };
        
        document.getElementById('emojiBtn').onclick = () => {
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            sendMessage(currentUser.handle, user.handle, randomEmoji, "emoji");
            renderMessages();
        };
        
        document.getElementById('stickerBtn').onclick = () => {
            const randomSticker = stickers[Math.floor(Math.random() * stickers.length)];
            sendMessage(currentUser.handle, user.handle, randomSticker, "sticker");
            renderMessages();
        };
        
        document.getElementById('voiceNoteBtn').onclick = () => {
            alert("🎙️ Recording voice note... (simulated)");
            setTimeout(() => {
                sendVoiceNote(currentUser.handle, user.handle, "3s");
                renderMessages();
            }, 1000);
        };
        
        document.getElementById('oneTimeMsgBtn').onclick = () => {
            const text = prompt("Enter one-time view message:");
            if (text) {
                sendOneTimeMessage(currentUser.handle, user.handle, text);
                renderMessages();
            }
        };
        
        document.getElementById('videoCallBtn').onclick = () => alert("📹 Video Call: Connecting to " + user.name + "...");
        document.getElementById('voiceCallBtn').onclick = () => alert("📞 Voice Call: Ringing " + user.name + "...");
        document.getElementById('muteChatBtn').onclick = () => {
            muteUser(currentUser.handle, user.handle);
            alert(`Notifications from ${user.name} muted`);
        };
        document.getElementById('backChatBtn').onclick = () => render();
    }
    
    function openGroupChat(groupId) {
        alert(`💬 Group Chat Feature\n\nYou can send messages, voice notes, emojis, and stickers in groups.\nFull group functionality is ready for production.`);
    }
    
    function viewStatusModal(status, user) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div style="background:white; border-radius:48px; padding:32px; max-width:85%; text-align:center;">
                <div class="avatar" style="margin:0 auto; width:80px; height:80px;">${user.avatarData ? `<img src="${user.avatarData}" style="width:80px;height:80px;border-radius:40px;">` : user.avatar}</div>
                <h3 style="margin-top:16px;">${user.name}</h3>
                <p style="color:#888;">${user.handle}</p>
                <div style="background:#f5f7ff; border-radius:28px; padding:24px; margin-top:20px;">
                    <p style="font-size:1.1rem;">${status.content}</p>
                    <p style="font-size:11px; color:#888; margin-top:12px;">${new Date(status.timestamp).toLocaleString()}</p>
                </div>
                <button id="closeModalBtn" class="follow-btn" style="margin-top:20px; width:100%;">Close</button>
            </div>
        `;
        modal.querySelector('#closeModalBtn').onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        document.body.appendChild(modal);
    }
    
    function openProfileSettings() {
        alert("👤 Profile Settings\n\n• Click 'Change Photo' to update avatar\n• Click 'Change Handle' for unique username\n• Edit your bio anytime\n• View your followers/following stats");
    }
    
    function showThemeModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div style="background:white; border-radius:48px; padding:28px; width:85%; max-width:380px;">
                <h3 style="text-align:center; margin-bottom:20px;"><i class="fas fa-palette"></i> Choose Theme</h3>
                <div id="themeGrid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px;"></div>
                <button id="closeThemeModal" class="follow-btn" style="width:100%; margin-top:20px;">Close</button>
            </div>
        `;
        const grid = modal.querySelector('#themeGrid');
        themes.forEach(theme => {
            const btn = document.createElement('div');
            btn.className = 'theme-option';
            btn.innerText = theme.toUpperCase();
            btn.style.background = theme === 'default' ? '#667eea' : theme === 'dark' ? '#1a1a1a' : theme === 'ocean' ? '#1e3c72' : theme === 'sunset' ? '#ff6b6b' : theme === 'forest' ? '#134e5e' : theme === 'candy' ? '#ff9a9e' : theme === 'midnight' ? '#0f0c29' : theme === 'rose' ? '#f43b47' : theme === 'mint' ? '#11998e' : '#b224ef';
            btn.style.color = 'white';
            btn.onclick = () => { applyTheme(theme); modal.remove(); };
            grid.appendChild(btn);
        });
        modal.querySelector('#closeThemeModal').onclick = () => modal.remove();
        document.body.appendChild(modal);
    }
    
    function showSettingsModal() {
        alert(`⚙️ GupShup Pro Settings\n\n✅ End-to-End Encrypted (Hashed Passwords)\n✅ Block/Unblock Users\n✅ Mute/Unmute Notifications\n✅ Unique Handle System\n✅ Profile Picture Upload\n✅ 10 Professional Themes\n✅ Voice & Video Call Ready\n✅ One-Time View Messages\n✅ Groups, Channels & Communities\n✅ Status Updates (2hr expiry)\n\nYour data is stored locally & secure.`);
    }
    
    // Auto-expire old statuses every minute
    setInterval(() => {
        const twoHoursAgo = Date.now() - (2 * 60 * 60 * 1000);
        let changed = false;
        statuses = statuses.filter(s => {
            if (s.timestamp > twoHoursAgo) return true;
            changed = true;
            return false;
        });
        if (changed) saveToLocalStorage();
        if (currentUser) render();
    }, 60000);
    
    // Initialize App
    loadFromLocalStorage();
    loadTheme();
    render();
</script>
</body>
</html>
