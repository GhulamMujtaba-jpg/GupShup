<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GupShup Messenger | Premium Chat App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 20 Themes */
        .theme-default { --primary: #075E54; --primary-dark: #054a3f; --secondary: #25D366; --bg: #ffffff; --surface: #f0f2f5; --text: #111111; --text-light: #667781; --border: #e9ecef; }
        .theme-dark { --primary: #1a1a2e; --primary-dark: #0f0f1a; --secondary: #e94560; --bg: #16213e; --surface: #0f3460; --text: #ffffff; --text-light: #a0a0a0; --border: #2a3a5a; }
        .theme-forest { --primary: #2E7D32; --primary-dark: #1B5E20; --secondary: #81C784; --bg: #F1F8E9; --surface: #DCEDC8; --text: #1B5E20; --text-light: #558B2F; --border: #C5E1A5; }
        .theme-ocean { --primary: #0277BD; --primary-dark: #01579B; --secondary: #4FC3F7; --bg: #E1F5FE; --surface: #B3E5FC; --text: #01579B; --text-light: #0288D1; --border: #81D4FA; }
        .theme-sunset { --primary: #D84315; --primary-dark: #BF360C; --secondary: #FF8A65; --bg: #FBE9E7; --surface: #FFCCBC; --text: #BF360C; --text-light: #E64A19; --border: #FFAB91; }
        .theme-lavender { --primary: #6A1B9A; --primary-dark: #4A148C; --secondary: #CE93D8; --bg: #F3E5F5; --surface: #E1BEE7; --text: #4A148C; --text-light: #8E24AA; --border: #CE93D8; }
        .theme-mint { --primary: #00897B; --primary-dark: #00695C; --secondary: #80CBC4; --bg: #E0F2F1; --surface: #B2DFDB; --text: #004D40; --text-light: #00796B; --border: #80CBC4; }
        .theme-crimson { --primary: #C62828; --primary-dark: #B71C1C; --secondary: #EF9A9A; --bg: #FFEBEE; --surface: #FFCDD2; --text: #B71C1C; --text-light: #E53935; --border: #EF9A9A; }
        .theme-coffee { --primary: #5D4037; --primary-dark: #4E342E; --secondary: #BCAAA4; --bg: #EFEBE9; --surface: #D7CCC8; --text: #3E2723; --text-light: #795548; --border: #BCAAA4; }
        .theme-midnight { --primary: #1A237E; --primary-dark: #0D47A1; --secondary: #9FA8DA; --bg: #E8EAF6; --surface: #C5CAE9; --text: #1A237E; --text-light: #3F51B5; --border: #9FA8DA; }
        .theme-rose { --primary: #AD1457; --primary-dark: #880E4F; --secondary: #F48FB1; --bg: #FCE4EC; --surface: #F8BBD0; --text: #880E4F; --text-light: #C2185B; --border: #F48FB1; }
        .theme-gold { --primary: #F57F17; --primary-dark: #E65100; --secondary: #FFB74D; --bg: #FFF8E1; --surface: #FFECB3; --text: #E65100; --text-light: #FF8F00; --border: #FFD54F; }
        .theme-teal { --primary: #00695C; --primary-dark: #004D40; --secondary: #4DB6AC; --bg: #E0F2F1; --surface: #B2DFDB; --text: #004D40; --text-light: #00796B; --border: #80CBC4; }
        .theme-grape { --primary: #7B1FA2; --primary-dark: #4A148C; --secondary: #CE93D8; --bg: #F3E5F5; --surface: #E1BEE7; --text: #4A148C; --text-light: #8E24AA; --border: #CE93D8; }
        .theme-lime { --primary: #827717; --primary-dark: #9E9D24; --secondary: #DCE775; --bg: #F9FBE7; --surface: #F0F4C3; --text: #827717; --text-light: #C0CA33; --border: #E6EE9C; }
        .theme-inky { --primary: #263238; --primary-dark: #1a2329; --secondary: #78909C; --bg: #ECEFF1; --surface: #CFD8DC; --text: #263238; --text-light: #546E7A; --border: #B0BEC5; }
        .theme-peach { --primary: #F4511E; --primary-dark: #D84315; --secondary: #FFAB91; --bg: #FBE9E7; --surface: #FFCCBC; --text: #BF360C; --text-light: #E64A19; --border: #FFAB91; }
        .theme-azure { --primary: #0288D1; --primary-dark: #0277BD; --secondary: #81D4FA; --bg: #E1F5FE; --surface: #B3E5FC; --text: #01579B; --text-light: #0288D1; --border: #81D4FA; }
        .theme-amber { --primary: #FF8F00; --primary-dark: #FF6F00; --secondary: #FFD54F; --bg: #FFF8E1; --surface: #FFECB3; --text: #E65100; --text-light: #FF8F00; --border: #FFD54F; }
        .theme-slate { --primary: #455A64; --primary-dark: #37474F; --secondary: #90A4AE; --bg: #ECEFF1; --surface: #CFD8DC; --text: #263238; --text-light: #546E7A; --border: #B0BEC5; }
        .theme-cherry { --primary: #D81B60; --primary-dark: #AD1457; --secondary: #F48FB1; --bg: #FCE4EC; --surface: #F8BBD0; --text: #880E4F; --text-light: #C2185B; --border: #F48FB1; }
        
        .app-container { width: 100%; max-width: 500px; height: 100vh; background: var(--bg); overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.2); transition: all 0.3s ease; }
        .app-header { background: var(--primary); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .logo h2 { font-size: 1.5rem; font-weight: 700; }
        .logo h2 i { margin-right: 8px; }
        .header-actions { display: flex; gap: 18px; font-size: 1.2rem; cursor: pointer; }
        .nav-tabs { display: flex; background: var(--primary); padding: 8px 12px; gap: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; }
        .nav-tab { flex: 1; text-align: center; padding: 8px 0; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.7rem; color: rgba(255,255,255,0.7); transition: 0.3s; }
        .nav-tab i { margin-right: 4px; }
        .nav-tab.active { background: rgba(255,255,255,0.2); color: white; }
        .content-area { flex: 1; overflow-y: auto; background: var(--surface); }
        .chat-list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .chat-list-item:hover { background: var(--surface); }
        .avatar { width: 50px; height: 50px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 1.2rem; overflow: hidden; position: relative; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #25D366; border-radius: 50%; border: 2px solid white; }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; background: var(--surface); }
        .message { display: flex; margin-bottom: 12px; animation: fadeIn 0.2s; }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 8px 12px; border-radius: 18px; word-wrap: break-word; position: relative; background: var(--bg); }
        .sent .bubble { background: var(--secondary); color: white; border-bottom-right-radius: 4px; }
        .received .bubble { background: var(--bg); border-bottom-left-radius: 4px; }
        .message-status { font-size: 0.6rem; margin-left: 5px; }
        .blue-tick { color: #34B7F1; }
        .typing-indicator { font-size: 0.7rem; color: var(--text-light); font-style: italic; padding: 4px 16px; background: var(--surface); }
        .chat-input-area { background: var(--bg); padding: 12px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .chat-input { flex: 1; background: var(--surface); border: none; padding: 12px 16px; border-radius: 30px; outline: none; }
        .icon-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; width: 44px; color: var(--primary); }
        .send-btn { background: var(--primary); border: none; width: 48px; border-radius: 50%; color: white; cursor: pointer; }
        .auth-card { background: var(--bg); border-radius: 32px; padding: 40px 24px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .auth-input { width: 100%; padding: 14px 18px; margin: 10px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; font-size: 1rem; outline: none; }
        .auth-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 50px; font-weight: bold; color: white; margin-top: 12px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); border-radius: 32px; padding: 24px; width: 85%; max-width: 350px; max-height: 80vh; overflow-y: auto; }
        .follow-btn { background: var(--primary); color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .status-card { background: var(--bg); margin: 8px 0; padding: 12px; border-radius: 20px; display: flex; gap: 12px; align-items: center; cursor: pointer; border: 1px solid var(--border); }
        .theme-selector { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 12px; max-height: 300px; overflow-y: auto; }
        .theme-option { padding: 8px; border-radius: 20px; text-align: center; cursor: pointer; background: var(--surface); border: 2px solid transparent; font-size: 0.7rem; }
        .theme-option.active { border-color: var(--primary); }
        .call-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--primary); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .starred { color: gold; }
        .search-box { padding: 12px; background: var(--bg); border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; padding: 10px; border-radius: 25px; border: 1px solid var(--border); background: var(--surface); outline: none; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ==================== STORAGE ====================
    const STORAGE = {
        users: 'gupshup_users_premium',
        messages: 'gupshup_msgs_premium',
        groups: 'gupshup_groups_premium',
        statuses: 'gupshup_statuses_premium',
        calls: 'gupshup_calls_premium',
        session: 'gupshup_session_premium',
        communities: 'gupshup_communities_premium',
        themes: 'gupshup_theme_premium'
    };
    
    let currentUser = null;
    let users = [];
    let messages = [];
    let groups = [];
    let statuses = [];
    let callLogs = [];
    let communities = [];
    let currentTab = 'chats';
    let currentTheme = localStorage.getItem(STORAGE.themes) || 'theme-default';
    let typingTimeouts = {};
    
    function applyTheme(themeName) {
        const container = document.querySelector('.app-container');
        if (container) container.className = `app-container ${themeName}`;
        currentTheme = themeName;
        localStorage.setItem(STORAGE.themes, themeName);
    }
    
    // ==================== AUTH ====================
    function generateOTP() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function sendOTP(email, otp) { alert(`[DEMO] Your OTP is: ${otp}\n(Simulated email OTP for ${email})`); return true; }
    
    function registerWithEmail(email, name) {
        if (users.find(u => u.email === email)) return null;
        let baseHandle = `@${name.toLowerCase().replace(/\s/g, '')}`;
        let handle = baseHandle;
        let counter = 1;
        while (users.some(u => u.handle === handle)) handle = `${baseHandle}${counter++}`;
        const newUser = {
            id: Date.now() + Math.random(),
            email, name, handle, avatar: name.charAt(0).toUpperCase(), avatarData: null,
            bio: "Hey there! I'm using GupShup", lastSeen: Date.now(), online: true,
            followers: [], following: [], blocked: [], muted: [], starredMessages: [],
            settings: { readReceipts: true, lastSeenVisible: true, notifMute: false, appLock: false, appPin: null },
            createdAt: Date.now()
        };
        users.push(newUser);
        saveData();
        return newUser;
    }
    
    function loginWithEmail(email) { return users.find(u => u.email === email); }
    function updateUserOnlineStatus(userId, isOnline) {
        let u = users.find(u => u.id == userId);
        if (u) { u.online = isOnline; u.lastSeen = Date.now(); saveData(); }
    }
    
    // ==================== MESSAGING ====================
    function sendMessage(fromId, toId, text, type = 'text', mediaUrl = null) {
        let msg = {
            id: Date.now() + Math.random(), from: fromId, to: toId, text, type, mediaUrl,
            timestamp: Date.now(), status: 'sent', isDeleted: false, isForwarded: false, replyTo: null, isStarred: false
        };
        messages.push(msg);
        saveData();
        setTimeout(() => { msg.status = 'delivered'; saveData(); renderChatIfOpen(); }, 800);
        setTimeout(() => {
            let tu = users.find(u => u.id == toId);
            if (tu && tu.settings.readReceipts) { msg.status = 'read'; saveData(); renderChatIfOpen(); }
        }, 2000);
        return msg;
    }
    
    function deleteMessage(messageId, forEveryone = false) {
        let idx = messages.findIndex(m => m.id == messageId);
        if (idx !== -1) {
            if (forEveryone) { messages[idx].isDeleted = true; messages[idx].text = "This message was deleted"; }
            else messages.splice(idx, 1);
            saveData(); renderChatIfOpen();
        }
    }
    
    function starMessage(messageId) {
        let msg = messages.find(m => m.id == messageId);
        if (msg) { msg.isStarred = !msg.isStarred; saveData(); renderChatIfOpen(); }
    }
    
    function forwardMessage(messageId, toId) {
        let original = messages.find(m => m.id == messageId);
        if (original) {
            sendMessage(currentUser.id, toId, original.text, original.type, original.mediaUrl);
            alert("Message forwarded!");
        }
    }
    
    function getChatMessages(u1, u2) {
        return messages.filter(m => ((m.from === u1 && m.to === u2) || (m.from === u2 && m.to === u1)) && !m.isDeleted)
            .sort((a, b) => a.timestamp - b.timestamp);
    }
    
    function getRecentChats(userId) {
        let chatUsers = new Set();
        messages.forEach(m => {
            if (m.from === userId && !isBlocked(userId, m.to)) chatUsers.add(m.to);
            if (m.to === userId && !isBlocked(userId, m.from)) chatUsers.add(m.from);
        });
        return Array.from(chatUsers).map(id => users.find(u => u.id == id)).filter(u => u);
    }
    
    function getAllUsersExcept(userId) { return users.filter(u => u.id !== userId && !isBlocked(userId, u.id)); }
    
    // ==================== FOLLOW SYSTEM ====================
    function followUser(currentUserId, targetUserId) {
        let target = users.find(u => u.id == targetUserId);
        if (target && !target.followers.includes(currentUserId)) {
            target.followers.push(currentUserId);
            let current = users.find(u => u.id == currentUserId);
            if (current && !current.following.includes(targetUserId)) current.following.push(targetUserId);
            saveData(); return true;
        }
        return false;
    }
    
    function unfollowUser(currentUserId, targetUserId) {
        let target = users.find(u => u.id == targetUserId);
        if (target) {
            target.followers = target.followers.filter(f => f != currentUserId);
            let current = users.find(u => u.id == currentUserId);
            if (current) current.following = current.following.filter(f => f != targetUserId);
            saveData(); return true;
        }
        return false;
    }
    
    function getStatusesFromFollowed(currentUserId) {
        let current = users.find(u => u.id == currentUserId);
        if (!current) return [];
        let followedIds = current.following || [];
        return statuses.filter(s => followedIds.includes(s.userId) && s.timestamp > Date.now() - 86400000).sort((a,b)=>b.timestamp - a.timestamp);
    }
    
    // ==================== BLOCK & MUTE ====================
    function blockUser(blockerId, targetId) {
        let target = users.find(u => u.id == targetId);
        if (target && !target.blocked.includes(blockerId)) target.blocked.push(blockerId);
        saveData();
    }
    
    function unblockUser(blockerId, targetId) {
        let target = users.find(u => u.id == targetId);
        if (target) target.blocked = target.blocked.filter(b => b !== blockerId);
        saveData();
    }
    
    function isBlocked(userId, targetId) {
        let target = users.find(u => u.id == targetId);
        return target?.blocked.includes(userId) || false;
    }
    
    function muteUser(userId, targetId) {
        let target = users.find(u => u.id == targetId);
        if (target && !target.muted.includes(userId)) target.muted.push(userId);
        saveData();
    }
    
    // ==================== COMMUNITY ====================
    function createCommunity(name, adminId, description = "") {
        let community = { id: Date.now() + Math.random(), name, admin: adminId, admins: [adminId], members: [adminId], groups: [], description, createdAt: Date.now() };
        communities.push(community);
        saveData();
        return community;
    }
    
    function addGroupToCommunity(communityId, groupId) {
        let comm = communities.find(c => c.id == communityId);
        if (comm && !comm.groups.includes(groupId)) { comm.groups.push(groupId); saveData(); }
    }
    
    function joinCommunity(communityId, userId) {
        let comm = communities.find(c => c.id == communityId);
        if (comm && !comm.members.includes(userId)) { comm.members.push(userId); saveData(); }
    }
    
    // ==================== PROFILE ====================
    function updateProfilePicture(userId, imageDataUrl) {
        let user = users.find(u => u.id == userId);
        if (user) { user.avatarData = imageDataUrl; user.avatar = ""; saveData(); return true; }
        return false;
    }
    
    function updateBio(userId, newBio) {
        let user = users.find(u => u.id == userId);
        if (user) { user.bio = newBio; saveData(); return true; }
        return false;
    }
    
    function updateHandle(userId, newHandle) {
        let user = users.find(u => u.id == userId);
        if (user && !users.some(u => u.handle === newHandle && u.id !== userId)) {
            user.handle = newHandle; saveData(); return true;
        }
        return false;
    }
    
    // ==================== STATUS ====================
    function addStatus(userId, content, type = 'text', mediaUrl = null) {
        let s = { id: Date.now() + Math.random(), userId, content, type, mediaUrl, timestamp: Date.now(), views: [], reactions: [] };
        statuses.push(s);
        saveData();
        return s;
    }
    
    function viewStatus(statusId, viewerId) {
        let s = statuses.find(s => s.id == statusId);
        if (s && !s.views.includes(viewerId)) { s.views.push(viewerId); saveData(); }
    }
    
    // ==================== GROUPS ====================
    function createGroup(name, adminId, members = []) {
        let g = { id: Date.now() + Math.random(), name, admin: adminId, admins: [adminId], members: [adminId, ...members], icon: null, description: "", createdAt: Date.now() };
        groups.push(g);
        saveData();
        return g;
    }
    
    function addMemberToGroup(groupId, memberId) {
        let g = groups.find(g => g.id == groupId);
        if (g && !g.members.includes(memberId)) { g.members.push(memberId); saveData(); }
    }
    
    // ==================== CALLS ====================
    function startCall(callerId, receiverId, type) {
        let call = { id: Date.now(), caller: callerId, receiver: receiverId, type, status: 'initiated', startTime: Date.now(), duration: 0 };
        callLogs.push(call);
        saveData();
        return call;
    }
    
    function endCall(callId) {
        let call = callLogs.find(c => c.id == callId);
        if (call) { call.status = 'ended'; call.duration = Date.now() - call.startTime; saveData(); }
    }
    
    // ==================== HELPERS ====================
    function saveData() {
        localStorage.setItem(STORAGE.users, JSON.stringify(users));
        localStorage.setItem(STORAGE.messages, JSON.stringify(messages));
        localStorage.setItem(STORAGE.groups, JSON.stringify(groups));
        localStorage.setItem(STORAGE.statuses, JSON.stringify(statuses));
        localStorage.setItem(STORAGE.calls, JSON.stringify(callLogs));
        localStorage.setItem(STORAGE.communities, JSON.stringify(communities));
        if (currentUser) localStorage.setItem(STORAGE.session, JSON.stringify({ userId: currentUser.id }));
    }
    
    function loadData() {
        let u = localStorage.getItem(STORAGE.users); let m = localStorage.getItem(STORAGE.messages); let g = localStorage.getItem(STORAGE.groups);
        let s = localStorage.getItem(STORAGE.statuses); let c = localStorage.getItem(STORAGE.calls); let comm = localStorage.getItem(STORAGE.communities);
        let session = localStorage.getItem(STORAGE.session);
        if (u) users = JSON.parse(u); if (m) messages = JSON.parse(m); if (g) groups = JSON.parse(g);
        if (s) statuses = JSON.parse(s); if (c) callLogs = JSON.parse(c); if (comm) communities = JSON.parse(comm);
        if (users.length === 0) initDemoData();
        if (session) { let { userId } = JSON.parse(session); currentUser = users.find(u => u.id == userId); }
    }
    
    function initDemoData() {
        users = [
            { id: "u1", email: "zara@example.com", name: "Zara Ahmed", handle: "@zara", avatar: "Z", avatarData: null, bio: "Digital Creator ✨", lastSeen: Date.now(), online: true, followers: [], following: [], blocked: [], muted: [], starredMessages: [], settings: { readReceipts: true, lastSeenVisible: true, notifMute: false, appLock: false, appPin: null }, createdAt: Date.now() },
            { id: "u2", email: "ali@example.com", name: "Ali Raza", handle: "@ali", avatar: "A", avatarData: null, bio: "Tech Enthusiast 💻", lastSeen: Date.now(), online: false, followers: [], following: [], blocked: [], muted: [], starredMessages: [], settings: { readReceipts: true, lastSeenVisible: true, notifMute: false, appLock: false, appPin: null }, createdAt: Date.now() },
            { id: "u3", email: "sana@example.com", name: "Sana Khan", handle: "@sana", avatar: "S", avatarData: null, bio: "Artist 🎨", lastSeen: Date.now(), online: true, followers: [], following: [], blocked: [], muted: [], starredMessages: [], settings: { readReceipts: true, lastSeenVisible: true, notifMute: false, appLock: false, appPin: null }, createdAt: Date.now() }
        ];
        messages = [{ id: "m1", from: "u1", to: "u2", text: "Hey Ali! Welcome to GupShup Premium! 🎉", type: "text", timestamp: Date.now() - 3600000, status: "read", isDeleted: false, isForwarded: false, replyTo: null, isStarred: false }];
        saveData();
    }

    function showFollowManager() {
        const allUsersList = getAllUsersExcept(currentUser.id);

        modalDiv.innerHTML = `<div class="modal-content"><h3 style="margin-bottom:16px;">👥 Follow Users</h3><div id="userFollowList" style="max-height:400px; overflow-y:auto;"></div><button id="closeFollowBtn" class="auth-btn" style="margin-top:16px;">Close</button></div>`;

    function openChat(user, skipRender = false) {
        currentChatUser = user;
        const msgs = getChatMessages(currentUser.id, user.id);
        if (!skipRender) {
            root.innerHTML = `<div class="app-container ${currentTheme}"><div class="app-header" style="background:var(--primary);"><button id="backBtn" style="background:none;border:none;color:white;font-size:1.2rem;"><i class="fas fa-arrow-left"></i></button><div class="avatar" style="width:40px;height:40px; position:relative;">${user.avatarData?`<img src="${user.avatarData}" style="width:40px;height:40px;border-radius:50%;">`:user.avatar}${user.online ? '<span class="online-dot" style="width:10px;height:10px;"></span>' : ''}</div><div style="flex:1; margin-left:12px;"><div style="font-weight:600;">${user.name}</div><div id="chatOnlineStatus" style="font-size:0.7rem;">${user.online ? '🟢 Online' : `Last seen ${new Date(user.lastSeen).toLocaleTimeString()}`}</div></div><i class="fas fa-phone" id="voiceCallBtn" style="margin:0 12px; cursor:pointer;"></i><i class="fas fa-video" id="videoCallBtn" style="cursor:pointer;"></i><i class="fas fa-ellipsis-v" id="chatMenuBtn" style="margin-left:12px; cursor:pointer;"></i></div><div id="typingIndicator" class="typing-indicator"></div><div class="messages-area" id="messagesArea"></div><div class="chat-input-area"><button class="icon-btn" id="emojiBtn">😊</button><button class="icon-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button><input type="text" id="messageInput" class="chat-input" placeholder="Type a message..."><button class="icon-btn" id="voiceNoteBtn"><i class="fas fa-microphone"></i></button><button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button></div></div>`;
        }
        
        const msgArea = document.getElementById('messagesArea');
        const typingIndicator = document.getElementById('typingIndicator');
        
        function renderMessages() {
            let updated = getChatMessages(currentUser.id, user.id);
            msgArea.innerHTML = updated.map(m => `
                <div class="message ${m.from === currentUser.id ? 'sent' : 'received'}" data-msg="${m.id}">
                    <div class="bubble">
                        ${m.type === 'text' ? m.text : m.type === 'image' ? '📷 Image' : m.type === 'video' ? '🎥 Video' : m.type === 'voice' ? '🎤 Voice note' : m.type === 'location' ? '📍 Location' : '📎 File'}
                        <span class="message-status">
                            ${m.from === currentUser.id ? (m.status === 'sent' ? '✓' : m.status === 'delivered' ? '✓✓' : m.status === 'read' ? '<span class="blue-tick">✓✓</span>' : '') : ''}
                        </span>
                        ${m.isStarred ? '<i class="fas fa-star starred" style="margin-left:5px; font-size:0.6rem;"></i>' : ''}
                    </div>
                </div>
            `).join('');
            msgArea.scrollTop = msgArea.scrollHeight;
        }
        
        renderMessages();
        
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        const sendMessageFunc = () => {
            let text = input.value.trim();
            if (text) {
                sendMessage(currentUser.id, user.id, text);
                input.value = '';
                renderMessages();
                if (typingTimeouts[user.id]) clearTimeout(typingTimeouts[user.id]);
                typingIndicator.innerHTML = '';
            }
        };
        
        sendBtn.onclick = sendMessageFunc;
        input.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessageFunc();
            else {
                typingIndicator.innerHTML = `${currentUser.name} is typing...`;
                if (typingTimeouts[user.id]) clearTimeout(typingTimeouts[user.id]);
                typingTimeouts[user.id] = setTimeout(() => { typingIndicator.innerHTML = ''; }, 1500);
            }
        };
        
        document.getElementById('emojiBtn').onclick = () => {
            let emojis = ['😀', '😂', '🥰', '😎', '🔥', '✨', '💯', '🎉', '❤️', '👍', '😢', '😡', '😱', '🥳', '🤔'];
            let randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            input.value += randomEmoji;
        };
        
        document.getElementById('attachBtn').onclick = () => {
            let type = prompt("Send:\n1-Image\n2-Video\n3-Document\n4-Location\n5-Contact");
            if (type === '1') sendMessage(currentUser.id, user.id, "📷 Image shared", "image");
            else if (type === '2') sendMessage(currentUser.id, user.id, "🎥 Video shared", "video");
            else if (type === '3') sendMessage(currentUser.id, user.id, "📄 Document shared", "document");
            else if (type === '4') sendMessage(currentUser.id, user.id, "📍 Location: 23.5° N, 77.5° E", "location");
            else if (type === '5') sendMessage(currentUser.id, user.id, `👤 Contact: ${currentUser.name} (${currentUser.email})`, "contact");
            renderMessages();
        };
        
        document.getElementById('voiceNoteBtn').onclick = () => {
            alert("🎙️ Recording voice note... (simulated)");
            setTimeout(() => {
                sendMessage(currentUser.id, user.id, "🎤 Voice note (3 seconds)", "voice");
                renderMessages();
            }, 2000);
        };
        
        document.getElementById('voiceCallBtn').onclick = () => initiateCall(user);
        document.getElementById('videoCallBtn').onclick = () => initiateCall(user, 'video');
        document.getElementById('chatMenuBtn').onclick = () => {
            let action = prompt("Options:\n1-Mute User\n2-Block User\n3-Clear Chat\n4-View Starred");
            if (action === '1') { muteUser(currentUser.id, user.id); alert("User muted!"); }
            else if (action === '2') { blockUser(currentUser.id, user.id); alert("User blocked!"); render(); }
            else if (action === '3') { messages = messages.filter(m => !((m.from === currentUser.id && m.to === user.id) || (m.from === user.id && m.to === currentUser.id))); saveData(); renderMessages(); }
            else if (action === '4') { let starred = messages.filter(m => m.isStarred && (m.from === user.id || m.to === user.id)); alert(`⭐ Starred:\n${starred.map(m => m.text).join('\n') || 'None'}`); }
        };
        document.getElementById('backBtn').onclick = () => { currentChatUser = null; render(); };
        
        applyTheme(currentTheme);
    }
    
    function initiateCall(user, type = 'voice') {
        let call = startCall(currentUser.id, user.id, type);
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content" style="text-align:center;"><div class="avatar" style="margin:0 auto 20px; width:80px; height:80px;">${user.avatar}</div><h3>${type === 'voice' ? '📞 Voice Call' : '📹 Video Call'}</h3><p>Calling ${user.name}...</p><button id="endCallBtn" class="auth-btn" style="background:#ff4444;">End Call</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('endCallBtn').onclick = () => { endCall(call.id); modal.remove(); alert("Call ended"); };
        setTimeout(() => { if (modal.parentNode) modal.remove(); alert("Call ended (simulated)"); }, 5000);
    }
    
    loadData();
    render();
    setInterval(() => { if (currentUser) updateUserOnlineStatus(currentUser.id, true); }, 30000);
    window.onbeforeunload = () => { if (currentUser) updateUserOnlineStatus(currentUser.id, false); };
</script>
</body>
</html>
